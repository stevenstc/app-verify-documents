services:
  # MongoDB database
  mongodb:
    container_name: mongodb
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-docu-chain}
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Node.js backend API
  server:
    container_name: server
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME:-docu-chain}?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      BTTC_RPC_URL: ${BTTC_RPC_URL:-https://rpc.bt.io}
      BTTC_CONTRACT_ADDRESS: ${BTTC_CONTRACT_ADDRESS}
      BTTC_PRIVATE_KEY: ${BTTC_PRIVATE_KEY:?BTTC_PRIVATE_KEY is required}
      MONTHLY_SUBSCRIPTION_BTT: ${MONTHLY_SUBSCRIPTION_BTT:-1000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      - mongodb
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # React frontend served by nginx (also proxies /api to server)
  client:
    container_name: client
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3333"
    depends_on:
      - server
    networks:
      - app-network

volumes:
  mongodb_data:
    driver: local

networks:
  app-network:
    driver: bridge
